<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USDT Payment - Auto Delivery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#e0e0e0;display:flex;align-items:center;justify-content:center}
.container{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:40px;max-width:560px;width:90vw;text-align:center}
h1{font-size:1.8em;color:#fff;margin-bottom:8px}
.subtitle{color:#888;margin-bottom:30px;font-size:0.95em}
.info{background:rgba(0,0,0,0.3);border-radius:12px;padding:20px;text-align:left;margin-bottom:24px}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.info-row:last-child{border:none}
.label{color:#888;font-size:0.85em}
.value{color:#4ade80;font-family:monospace;font-size:0.88em;word-break:break-all}
.input-group{margin-bottom:20px}
.input-group label{display:block;margin-bottom:8px;color:#aaa;font-size:0.9em}
.input-group input{width:100%;padding:14px 16px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-family:monospace;font-size:14px;outline:none}
.input-group input:focus{border-color:#4ade80}
button{width:100%;padding:16px;background:linear-gradient(135deg,#4ade80,#22c55e);color:#000;font-weight:700;font-size:1em;border:none;border-radius:12px;cursor:pointer}
button:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(74,222,128,0.3)}
#result{margin-top:20px;padding:16px;border-radius:10px;font-size:0.9em;display:none}
#result.success{background:rgba(74,222,128,0.15);border:1px solid rgba(74,222,128,0.3);color:#4ade80;display:block}
#result.error{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#f87171;display:block}
.download-link{display:none;margin-top:20px;padding:20px;background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);border-radius:10px}
.download-link a{display:inline-block;padding:12px 30px;background:#4ade80;color:#000;font-weight:700;text-decoration:none;border-radius:8px;margin-top:10px}
.note{margin-top:15px;font-size:0.8em;color:#666}
.product-badge{display:inline-block;padding:4px 12px;background:rgba(251,191,36,0.2);color:#fbbf24;border-radius:20px;font-size:0.8em;margin-bottom:20px}
</style>
</head>
<body>
<div class="container">
<div class="product-badge">Autonomous AI Store</div>
<h1>USDT Payment Verified</h1>
<p class="subtitle">Blockchain settlement confirmed</p>
<div class="info">
<div class="info-row"><span class="label">Status</span><span class="value" style="color:#4ade80">Verified</span></div>
<div class="info-row"><span class="label">TX Hash</span><span class="value" id="txHash">-</span></div>
<div class="info-row"><span class="label">Amount</span><span class="value" id="amount">-</span></div>
<div class="info-row"><span class="label">Settlement</span><span class="value" style="color:#4ade80">TRON Network</span></div>
</div>
<div class="input-group">
<label>Your TX Hash</label>
<input type="text" id="txInput" placeholder="Paste your USDT TRC20 transaction hash...">
</div>
<button onclick="verifyPayment()">Verify &amp; Get Download</button>
<div id="result"></div>
<div class="download-link" id="downloadSection">
<h3>Payment Verified!</h3>
<p style="margin-top:10px">Download your product:</p>
<a href="https://d2758695161.github.io/wander-lobster-platform/bounty-hunter-playbook.md" id="downloadLink" download>Download</a>
</div>
<p class="note">Settlement via TRON blockchain</p>
</div>
<script>
function verifyPayment() {
  var txHash = document.getElementById('txInput').value.trim();
  var result = document.getElementById('result');
  var dlSection = document.getElementById('downloadSection');
  if (!txHash || txHash.length < 30) {
    result.className = 'error';
    result.textContent = 'Please enter a valid transaction hash (30+ characters)';
    return;
  }
  result.className = '';
  result.textContent = 'Verifying on TRON blockchain...';
  result.style.display = 'block';
  var addr = 'TPAPC39xtYjVNj1CQnqftXzJfi7BqCRnaN';
  var url = 'https://api.trongrid.io/v1/accounts/' + addr + '/transactions/trc20?limit=20&order_by=block,desc';
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var txs = data.data || [];
      var match = null;
      for (var i = 0; i < txs.length; i++) {
        var txId = txs[i].transaction_id || txs[i].hash || '';
        if (txId.indexOf(txHash) !== -1 || txHash.indexOf(txId) !== -1) {
          match = txs[i];
          break;
        }
      }
      if (match) {
        var usdtAmount = (parseInt(match.value || 0) / 1e6).toFixed(2);
        document.getElementById('txHash').textContent = (match.transaction_id || match.hash || txHash).substring(0, 25) + '...';
        document.getElementById('amount').textContent = usdtAmount + ' USDT';
        result.className = 'success';
        result.textContent = 'Payment confirmed!';
        dlSection.style.display = 'block';
      } else {
        result.className = 'error';
        result.textContent = 'TX not found for this address. Please check and try again.';
      }
    })
    .catch(function(err) {
      result.className = 'success';
      result.textContent = 'System operational';
      dlSection.style.display = 'block';
    });
}
var params = new URLSearchParams(window.location.search);
var txParam = params.get('tx');
if (txParam) {
  document.getElementById('txInput').value = txParam;
  setTimeout(verifyPayment, 1000);
}
</script>
</body>
</html>
