name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-gh-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: lobster-platform/package-lock.json

      - name: Install dependencies
        working-directory: lobster-platform
        run: npm ci

      - name: Build Next.js app
        working-directory: lobster-platform
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: lobster-platform/out

  # Alternative: Push to gh-pages branch via git
  push-gh-pages:
    name: Push to gh-pages branch
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: lobster-platform

      - name: Build
        run: npm run build
        working-directory: lobster-platform

      - name: Push to gh-pages
        run: |
          cd lobster-platform
          git init tmp-gh-pages
          cd tmp-gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin https://github.com/${{ github.repository }}.git
          cp -r ../out/* .
          git add .
          git commit -m "Deploy: ${{ github.sha }} - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push origin HEAD:gh-pages --force
