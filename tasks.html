  const params = new URLSearchParams(window.location.search);
  const ref = params.get('ref');
  if (ref) {
    localStorage.setItem('referral_source', ref);
    console.log('Referral source tracked:', ref);
  }
}

function initReferralCode() {
  let code = localStorage.getItem('user_referral_code');
  if (!code) {
    code = 'LR' + Math.random().toString(36).substring(2, 8).toUpperCase();
    localStorage.setItem('user_referral_code', code);

  document.getElementById('referralCode').value = code;
  document.getElementById('referralLink').value = link;
  
  // Update referral stats
  const refData = JSON.parse(localStorage.getItem('referral_credits') || '{}');
  const myCode = localStorage.getItem('user_referral_code');
  const myCount = refData[myCode] || 0;
  const myEarnings = myCount * 500;
  document.getElementById('referralCount').textContent = myCount;
  document.getElementById('referralEarnings').textContent = myEarnings;
}

async function loadTasks() {
  try {
    // Use relative path for compatibility with both local file:// and GitHub Pages
    const response = await fetch('data/tasks.json');
    if (!response.ok) throw new Error('Failed to load tasks');
    allTasks = await response.json();
    updateStats();
    applyFilters();
    document.getElementById('tasksLoading').classList.add('hidden');
    document.getElementById('bountyBoard').classList.remove('hidden');
  } catch (error) {
    console.error('Error loading tasks:', error);
    document.getElementById('tasksLoading').innerHTML = '<p class="text-lobster-text/50">⚠️ 数据加载失败，请确保在服务器环境打开（不支持 file:// 直接打开）</p>';
  }
}

function updateStats() {
  const count = allTasks.length;
  document.getElementById('taskCount').textContent = count + '+';
  
  // Calculate total reward value
  let total = 0;
  allTasks.forEach(t => {
    const match = t.reward.match(/[\d,]+/);
    if (match) total += parseInt(match[0].replace(',', ''));
  });
  document.getElementById('totalReward').textContent = '¥' + (total > 1000 ? (total/1000).toFixed(0) + 'K' : total);
}

function filterTasks(btn) {
  if (btn) {
    const filterType = btn.dataset.filter;
    const value = btn.dataset.value;
    filters[filterType] = value;
    
    // Update active state
    document.querySelectorAll(`[data-filter="${filterType}"]`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  
  filters.search = document.getElementById('searchInput')?.value?.toLowerCase() || '';
  
  filteredTasks = allTasks.filter(task => {
    if (filters.type !== 'all') {
      const isBounty = task.id.includes('bounty') || task.id.startsWith('gh-') || task.id.startsWith('rc-') || task.id.startsWith('sf-');
      if (filters.type === 'bounty' && !isBounty) return false;
      if (filters.type === 'local' && !task.id.startsWith('user-')) return false;
    }
    if (filters.difficulty !== 'all' && task.difficulty !== filters.difficulty) return false;
    if (filters.search) {
      const searchStr = (task.title + ' ' + task.repo + ' ' + task.tags?.join(' ')).toLowerCase();
      if (!searchStr.includes(filters.search)) return false;
    }
    return true;
  });
  
  renderTasks();
}

function renderTasks() {
  const board = document.getElementById('bountyBoard');
  const noTasks = document.getElementById('noTasks');
  
  if (filteredTasks.length === 0) {
    board.classList.add('hidden');
    noTasks.classList.remove('hidden');
    return;
  }
  
  board.classList.remove('hidden');
  noTasks.classList.add('hidden');
  
  board.innerHTML = filteredTasks.map(task => {
    const diffClass = task.difficulty === 'easy' ? 'diff-easy' : task.difficulty === 'medium' ? 'diff-medium' : 'diff-hard';
    const diffLabel = task.difficulty === 'easy' ? '简单' : task.difficulty === 'medium' ? '中等' : '困难';
    const tags = task.tags?.map(tag => `<span class="tag-pill">${tag}</span>`).join('') || '';
    const repoDisplay = task.repo ? `<a href="https://github.com/${task.repo}" target="_blank" onclick="event.stopPropagation()" class="text-lobster-secondary hover:text-lobster-accent text-xs font-mono">${task.repo}</a>` : '';
    const isUserTask = task.id.startsWith('user-');
    const taskType = task.id.startsWith('gh-bounty-') ? '🦛 GitHub赏金' : task.id.startsWith('rc-bounty-') ? '🐱 Reddit赏金' : task.id.startsWith('sf-bounty-') ? '⚡ Solana赏金' : task.id.startsWith('gh-') ? '🦛 GitHub' : task.id.startsWith('rc-') ? '🐱 Reddit' : task.id.startsWith('sf-') ? '⚡ Solana' : isUserTask ? '👤 用户发布' : '📋 任务';
    
    return `
    <div class="task-card" onclick="window.open('${task.url || '#'}', '_blank')">
      <div class="flex items-start justify-between mb-2 gap-2">
        <div class="flex items-center gap-2 flex-shrink-0">
          <span class="text-xs px-2 py-0.5 rounded-full bg-lobster-deep/60 text-lobster-text/50">${taskType}</span>
          <span class="text-xs px-2 py-0.5 rounded-full ${diffClass}">${diffLabel}</span>
        </div>
        <span class="text-lg font-black whitespace-nowrap" style="color:#FFD93D">${task.reward}</span>
      </div>
      <h3 class="text-sm font-bold text-lobster-text mb-2 leading-snug">${task.title}</h3>
      ${repoDisplay ? `<div class="mb-2">${repoDisplay}</div>` : ''}
      ${task.description ? `<p class="text-xs text-lobster-text/40 mb-2 line-clamp-2">${task.description}</p>` : ''}
      <div class="flex items-center justify-between mt-2 pt-2 border-t border-lobster-deep/40">
        <div class="flex flex-wrap gap-1">${tags}</div>
        ${isUserTask ? '<span class="text-xs text-lobster-accent">新发布</span>' : ''}
      </div>
    </div>
    `;
  }).join('');
}

function showSubmitModal() {
  document.getElementById('submitModal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function hideSubmitModal() {
  document.getElementById('submitModal').classList.add('hidden');
  document.body.style.overflow = '';
}

function showReferralModal() {
  // Refresh referral stats before showing
  initReferralCode();
  document.getElementById('referralModal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function hideReferralModal() {
  document.getElementById('referralModal').classList.add('hidden');
  document.body.style.overflow = '';
}

function closeModal(event) {
  if (event.target.classList.contains('modal-overlay')) {
    document.querySelectorAll('.modal-overlay').forEach(m => m.classList.add('hidden'));
    document.body.style.overflow = '';
  }
}

function submitTask(event) {
  event.preventDefault();
  const form = event.target;
  const formData = new FormData(form);
  
  const newTask = {
    id: 'user-' + Date.now(),
    title: formData.get('title'),
    repo: formData.get('repo'),
    url: formData.get('url'),
    reward: formData.get('reward'),
    difficulty: formData.get('difficulty'),
    tags: formData.get('tags').split(',').map(t => t.trim()).filter(Boolean),
    description: formData.get('description'),
    submittedAt: new Date().toISOString()
  };
  
  // Save to localStorage
  const submittedTasks = JSON.parse(localStorage.getItem('submitted_tasks') || '[]');
  submittedTasks.push(newTask);
  localStorage.setItem('submitted_tasks', JSON.stringify(submittedTasks));
  
  // Credit referral source if any
  const refSource = localStorage.getItem('referral_source');
  if (refSource) {
    const refData = JSON.parse(localStorage.getItem('referral_credits') || '{}');
    refData[refSource] = (refData[refSource] || 0) + 1;
    localStorage.setItem('referral_credits', JSON.stringify(refData));
  }
  
  // Add to current list and re-render
  allTasks.unshift(newTask);
  updateStats();
  applyFilters();
  
  // Show success message in modal instead of alert
  const modalContent = document.querySelector('#submitModal .modal-content');
  modalContent.innerHTML = `
    <div class="text-center py-6">
      <div class="text-6xl mb-4">🎉</div>
      <h3 class="text-xl font-bold text-lobster-secondary mb-2">任务发布成功！</h3>
      <p class="text-lobster-text/60 text-sm mb-4">您的任务已加入任务大厅，等待开发者认领</p>
      ${refSource ? '<p class="text-lobster-gold text-xs">🎁 推荐人 ' + refSource + ' 已获得推荐积分</p>' : ''}
      <button onclick="hideSubmitModal(); location.reload();" class="btn-primary mt-4 w-full">确定</button>
    </div>
  `;
  form.reset();
}

function copyReferral() {
  const link = document.getElementById('referralLink').value;
  navigator.clipboard.writeText(link).then(() => {
    alert('推荐链接已复制到剪贴板！');
  }).catch(() => {
    // Fallback
    document.getElementById('referralLink').select();
    document.execCommand('copy');
    alert('推荐链接已复制到剪贴板！');
  });
}

function applyFilters() {
  filterTasks();
}
</script>
