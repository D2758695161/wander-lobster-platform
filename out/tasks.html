<script>
(function(){
  var PLATFORM_URL = 'https://d2758695161.github.io/wander-lobster-platform';
  var allTasks = [];
  var filteredTasks = [];
  var filters = { difficulty: 'all', search: '' };

  function getTasksPath() {
    // In out/ directory, tasks.json is at ../tasks.json relative to tasks.html
    // But for GitHub Pages, it's at /wander-lobster-platform/tasks.json
    var path = 'tasks.json';
    // Try to detect base path from current location
    var loc = window.location.pathname;
    if (loc.indexOf('/out/') !== -1 || loc.indexOf('out\\') !== -1) {
      // Already in out/ directory, tasks.json is in the same dir
    }
    return path;
  }

  function checkReferral() {
    var params = {};
    try { params = new URLSearchParams(window.location.search); } catch(e) {}
    var ref = params.get ? params.get('ref') : (function(){
      var m = window.location.search.match(/[\?&]ref=([^&]+)/);
      return m ? m[1] : null;
    })();
    if (ref) {
      try { localStorage.setItem('referral_source', ref); } catch(e) {}
    }
  }

  function initReferralCode() {
    var code;
    try {
      code = localStorage.getItem('user_referral_code');
      if (!code) {
        code = 'LR' + Math.random().toString(36).substring(2, 8).toUpperCase();
        localStorage.setItem('user_referral_code', code);
      }
    } catch(e) { code = 'LR' + Math.random().toString(36).substring(2, 8).toUpperCase(); }
    var link = PLATFORM_URL + '/tasks.html?ref=' + code;
    var rc = document.getElementById('referralCode');
    var rl = document.getElementById('referralLink');
    if (rc) rc.value = code;
    if (rl) rl.value = link;

    var refData = {};
    try { refData = JSON.parse(localStorage.getItem('referral_credits') || '{}'); } catch(e) {}
    var myCode;
    try { myCode = localStorage.getItem('user_referral_code'); } catch(e) { myCode = code; }
    var myCount = refData[myCode] || 0;
    var myEarnings = myCount * 500;
    var rcEl = document.getElementById('referralCount');
    var reEl = document.getElementById('referralEarnings');
    if (rcEl) rcEl.textContent = myCount;
    if (reEl) reEl.textContent = myEarnings;
  }

  function loadTasks() {
    var path = getTasksPath();
    fetch(path)
      .then(function(res) {
        if (!res.ok) throw new Error('Failed to load tasks');
        return res.json();
      })
      .then(function(data) {
        allTasks = data;
        updateStats();
        applyFilters();
        document.getElementById('tasksLoading').classList.add('hidden');
        document.getElementById('bountyBoard').classList.remove('hidden');
      })
      .catch(function(err) {
        console.error('Error loading tasks:', err);
        var el = document.getElementById('tasksLoading');
        if (el) el.innerHTML = '<p class="text-lobster-text/50" style="font-size:16px;margin-top:16px">⚠️ 数据加载失败，请通过 GitHub Pages 访问（本地 file:// 不支持 fetch）<br><a href="' + PLATFORM_URL + '/tasks.html" style="color:#FF6B35;text-decoration:underline">点击访问在线版本</a></p>';
      });
  }

  function updateStats() {
    var count = allTasks.length;
    var tc = document.getElementById('taskCount');
    if (tc) tc.textContent = count + '+';

    var total = 0;
    for (var i = 0; i < allTasks.length; i++) {
      var match = allTasks[i].reward.match(/[\d,]+/);
      if (match) total += parseInt(match[0].replace(',', ''), 10);
    }
    var tr = document.getElementById('totalReward');
    if (tr) tr.textContent = '¥' + (total > 1000 ? (total/1000).toFixed(0) + 'K' : total);
  }

  function filterTasks(btn) {
    if (btn) {
      var filterType = btn.getAttribute('data-filter');
      var value = btn.getAttribute('data-value');
      filters[filterType] = value;
      var siblings = document.querySelectorAll('[data-filter="' + filterType + '"]');
      for (var i = 0; i < siblings.length; i++) siblings[i].classList.remove('active');
      btn.classList.add('active');
    }

    var searchEl = document.getElementById('searchInput');
    filters.search = searchEl ? (searchEl.value || '').toLowerCase() : '';

    filteredTasks = allTasks.filter(function(task) {
      if (filters.difficulty !== 'all' && task.difficulty !== filters.difficulty) return false;
      if (filters.search) {
        var searchStr = (task.title + ' ' + (task.repo||'') + ' ' + ((task.tags||[]).join(' '))).toLowerCase();
        if (searchStr.indexOf(filters.search) === -1) return false;
      }
      return true;
    });

    renderTasks();
  }

  function renderTasks() {
    var board = document.getElementById('bountyBoard');
    var noTasks = document.getElementById('noTasks');

    if (filteredTasks.length === 0) {
      board.classList.add('hidden');
      noTasks.classList.remove('hidden');
      return;
    }

    board.classList.remove('hidden');
    noTasks.classList.add('hidden');

    var html = '';
    for (var i = 0; i < filteredTasks.length; i++) {
      var task = filteredTasks[i];
      var diffClass = task.difficulty === 'easy' ? 'diff-easy' : task.difficulty === 'medium' ? 'diff-medium' : 'diff-hard';
      var diffLabel = task.difficulty === 'easy' ? '简单' : task.difficulty === 'medium' ? '中等' : '困难';
      var tags = task.tags ? task.tags.map(function(tag){ return '<span class="tag-pill">' + tag + '</span>'; }).join('') : '';
      var repoDisplay = task.repo ? '<a href="https://github.com/' + task.repo + '" target="_blank" class="text-lobster-secondary hover:text-lobster-accent text-xs font-mono" onclick="event.stopPropagation()">' + task.repo + '</a>' : '';
      var isUserTask = task.id && task.id.indexOf('user-') === 0;
      var taskType = task.id && task.id.indexOf('gh-') === 0 ? '🦛 GitHub' : task.id && task.id.indexOf('rc-') === 0 ? '🐱 Reddit' : task.id && task.id.indexOf('sf-') === 0 ? '⚡ Solana' : isUserTask ? '👤 用户发布' : '📋 任务';
      var url = task.url || '#';
      var desc = task.description ? '<p class="text-xs text-lobster-text/40 mb-2 line-clamp-2">' + task.description + '</p>' : '';

      html += '<div class="task-card" onclick="window.open(\'' + url.replace(/'/g, "\\'") + '\', \'_blank\')">' +
        '<div class="flex items-start justify-between mb-2 gap-2">' +
          '<div class="flex items-center gap-2 flex-shrink-0">' +
            '<span class="text-xs px-2 py-0.5 rounded-full bg-lobster-deep/60 text-lobster-text/50">' + taskType + '</span>' +
            '<span class="text-xs px-2 py-0.5 rounded-full ' + diffClass + '">' + diffLabel + '</span>' +
          '</div>' +
          '<span class="text-lg font-black whitespace-nowrap" style="color:#FFD93D">' + task.reward + '</span>' +
        '</div>' +
        '<h3 class="text-sm font-bold text-lobster-text mb-2 leading-snug">' + task.title + '</h3>' +
        (repoDisplay ? '<div class="mb-2">' + repoDisplay + '</div>' : '') +
        desc +
        '<div class="flex items-center justify-between mt-2 pt-2 border-t border-lobster-deep/40">' +
          '<div class="flex flex-wrap gap-1">' + tags + '</div>' +
          (isUserTask ? '<span class="text-xs text-lobster-accent">新发布</span>' : '') +
        '</div>' +
      '</div>';
    }
    board.innerHTML = html;
  }

  function showSubmitModal() {
    document.getElementById('submitModal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }

  function hideSubmitModal() {
    document.getElementById('submitModal').classList.add('hidden');
    document.body.style.overflow = '';
  }

  function showReferralModal() {
    initReferralCode();
    document.getElementById('referralModal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }

  function hideReferralModal() {
    document.getElementById('referralModal').classList.add('hidden');
    document.body.style.overflow = '';
  }

  function closeModal(event) {
    if (event.target.classList.contains('modal-overlay')) {
      var modals = document.querySelectorAll('.modal-overlay');
      for (var i = 0; i < modals.length; i++) modals[i].classList.add('hidden');
      document.body.style.overflow = '';
    }
  }

  function submitTask(event) {
    event.preventDefault();
    var form = event.target;
    var fd = new FormData(form);

    var newTask = {
      id: 'user-' + Date.now(),
      title: fd.get('title'),
      repo: fd.get('repo'),
      url: fd.get('url'),
      reward: fd.get('reward'),
      difficulty: fd.get('difficulty'),
      tags: fd.get('tags').split(',').map(function(t){ return t.trim(); }).filter(Boolean),
      description: fd.get('description'),
      submittedAt: new Date().toISOString()
    };

    try {
      var submittedTasks = JSON.parse(localStorage.getItem('submitted_tasks') || '[]');
      submittedTasks.push(newTask);
      localStorage.setItem('submitted_tasks', JSON.stringify(submittedTasks));

      var refSource = localStorage.getItem('referral_source');
      if (refSource) {
        var refData = JSON.parse(localStorage.getItem('referral_credits') || '{}');
        refData[refSource] = (refData[refSource] || 0) + 1;
        localStorage.setItem('referral_credits', JSON.stringify(refData));
      }
    } catch(e) {}

    allTasks.unshift(newTask);
    updateStats();
    applyFilters();

    var modalContent = document.querySelector('#submitModal .modal-content');
    var refSrc = '';
    try { refSrc = localStorage.getItem('referral_source') || ''; } catch(e) {}
    modalContent.innerHTML = '<div class="text-center py-6">' +
      '<div class="text-6xl mb-4">🎉</div>' +
      '<h3 class="text-xl font-bold text-lobster-secondary mb-2">任务发布成功！</h3>' +
      '<p class="text-lobster-text/60 text-sm mb-4">您的任务已加入任务大厅，等待开发者认领</p>' +
      (refSrc ? '<p class="text-lobster-gold text-xs">🎁 推荐人 ' + refSrc + ' 已获得推荐积分</p>' : '') +
      '<button onclick="hideSubmitModal(); location.reload();" class="btn-primary mt-4 w-full cursor-pointer">确定</button>' +
    '</div>';
    form.reset();
  }

  function copyReferral() {
    var link = document.getElementById('referralLink').value;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(link).then(function() {
        var btn = document.querySelector('#referralModal .btn-secondary:last-of-type') || document.querySelector('#referralModal button');
        alert('推荐链接已复制到剪贴板！');
      }).catch(function() { fallbackCopy(link); });
    } else {
      fallbackCopy(link);
    }
  }

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); alert('推荐链接已复制到剪贴板！'); } catch(e) { alert('复制失败，请手动复制'); }
    document.body.removeChild(ta);
  }

  function applyFilters() { filterTasks(); }

  // Init
  checkReferral();
  initReferralCode();
  loadTasks();
})();
</script>
</body>
</html>
